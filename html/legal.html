<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="aboutPageTitle"></title>
    <script src="../external_js/theme_bootstrap.js"></script>
    <script src="../external_js/theme_favicon.js"></script>
    <style>
        @font-face {
            font-family: 'Old-Country-Nobility';
            src: url('../Old-Country-Nobility/Old-Country-Nobility.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root[data-theme="midnight"] {
            /* Primary Background Colors */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-quaternary: #475569;
            --bg-primary-theme: #1e293b;
            
            /* Interactive Elements */
            --button-primary: #2563eb;
            --button-hover: #3b82f6;
            --button-danger: #dc2626;
            --button-danger-hover: #ef4444;
            --button-success: #16a34a;
            --button-success-hover: #22c55e;
            --button-secondary: #6b7280;
            --button-secondary-hover: #4b5563;
            --button-info: #0891b2;
            --button-info-hover: #0e7490;
            --logo-bg: #ffffff;
            --logo-accent: #2563eb;
            
            /* Text Colors */
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;

            /* Border and Shadow Colors */
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.25);

            /* Input and Interactive Element Colors */
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: #3b82f6;
            --toggle-bg: rgba(255, 255, 255, 0.2);
            --toggle-active: #2563eb;

            /* Privacy specific colors */
            --accept-button: #16a34a;
            --accept-button-hover: #22c55e;
            --withdraw-button: #dc2626;
            --withdraw-button-hover: #ef4444;
            --theme-icon-filter: brightness(0) invert(1);
        }

        /* Light theme */
        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --bg-quaternary: #cbd5e1;
            --bg-primary-theme: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
            --input-border: rgba(0, 0, 0, 0.1);
            --button-primary: #2563eb;
            --button-hover: #1e40af;
            --button-danger: #dc2626;
            --button-danger-hover: #b91c1c;
            --button-success: #16a34a;
            --button-success-hover: #15803d;
            --button-secondary: #6b7280;
            --button-secondary-hover: #4b5563;
            --button-info: #0891b2;
            --button-info-hover: #0e7490;
            --input-focus: #1e3a8a;
            --logo-bg: #2563eb;
            --logo-accent: #f1f5f9;
            --toggle-bg: #cbd5e1;
            --toggle-active: #2563eb;
            --accept-button: #16a34a;
            --accept-button-hover: #15803d;
            --withdraw-button: #dc2626;
            --withdraw-button-hover: #b91c1c;
            --theme-icon-filter: brightness(0) saturate(100%);
        }

        /* Ice Cold theme */
        :root[data-theme="icecold"] {
           --bg-primary: #e5eaf5;
           --bg-secondary: #f3f7fd;
           --bg-tertiary: #d7e8f6;
           --bg-quaternary: #a0d2eb;
           --bg-primary-theme: #f3f7fd;

           --button-primary: #8458b3;
           --button-hover: #a28089;
           --button-danger: #8458b3;
           --button-danger-hover: #a28089;
           --button-success: #8458b3;
           --button-success-hover: #a28089;
           --button-secondary: #6b7280;
           --button-secondary-hover: #4b5563;
           --button-info: #8458b3;
           --button-info-hover: #a28089;

           --text-primary: #1f2937;
           --text-secondary: #334155;
           --text-muted: #64748b;

           --border-color: rgba(148, 163, 184, 0.35);
           --shadow-color: rgba(0, 0, 0, 0.08);

           --input-bg: #ffffff;
           --input-border: rgba(148, 163, 184, 0.45);
           --input-focus: #8458b3;
           --toggle-bg: rgba(132, 88, 179, 0.2);
           --toggle-active: #8458b3;
           --logo-bg: #ffffff;
           --logo-accent: #8458b3;
           --accept-button: #8458b3;
           --accept-button-hover: #a28089;
           --withdraw-button: #a28089;
           --withdraw-button-hover: #8458b3;
           --theme-icon-filter: brightness(0) saturate(100%);
        }

        /* Zen Grey theme */
        :root[data-theme="dark"] {
           --bg-primary: #0f111a;
           --bg-secondary: #161a24;
           --bg-tertiary: #232838;
           --bg-quaternary: #2f3648;
           --bg-primary-theme: #161a24;

           --button-primary: #2f3648;
           --button-hover: #232838;
           --button-danger: #dc2626;
           --button-danger-hover: #ef4444;
           --button-success: #2f3648;
           --button-success-hover: #232838;
           --button-secondary: #4b5563;
           --button-secondary-hover: #374151;
           --button-info: #2f3648;
           --button-info-hover: #232838;

           --text-primary: #f1f5f9;
           --text-secondary: #cbd5e1;
           --text-muted: #94a3b8;

           --border-color: rgba(255, 255, 255, 0.12);
           --shadow-color: rgba(0, 0, 0, 0.35);

           --input-bg: rgba(255, 255, 255, 0.06);
           --input-border: rgba(255, 255, 255, 0.14);
           --input-focus: #8ab4e6;
           --toggle-bg: rgba(47, 54, 72, 0.45);
           --toggle-active: #2f3648;
           --logo-bg: #ffffff;
           --logo-accent: #2f3648;
           --accept-button: #8ab4e6;
           --accept-button-hover: #6fa0db;
           --withdraw-button: #dc2626;
           --withdraw-button-hover: #ef4444;
           --theme-icon-filter: brightness(0) invert(1);
        }

        /* Sunset Orange theme */
        :root[data-theme="sunset"] {
           --bg-primary: #f5f3f0;
           --bg-secondary: #fffdfb;
           --bg-tertiary: #fff6f2;
           --bg-quaternary: #f76f53;
           --bg-primary-theme: #fffdfb;
    
           --button-primary: #f76f53;
           --button-hover: #c85a3e;
           --button-danger: #dc2626;
           --button-danger-hover: #ef4444;
           --button-success: #f76f53;
           --button-success-hover: #c85a3e;
           --button-secondary: #6b7280;
           --button-secondary-hover: #4b5563;
           --button-info: #f76f53;
           --button-info-hover: #c85a3e;
    
           --text-primary: #1a1a1a;
           --text-secondary: #6b6b6b;
           --text-muted: #6b6b6b;
    
           --border-color: rgba(0, 0, 0, 0.08);
           --shadow-color: rgba(0, 0, 0, 0.06);
    
           --input-bg: rgba(0, 0, 0, 0.04);
           --input-border: rgba(0, 0, 0, 0.15);
           --input-focus: #f76f53;
           --toggle-bg: rgba(0, 0, 0, 0.06);
           --toggle-active: #f76f53;
           --logo-bg: #ffffff;
           --logo-accent: #f76f53;
           --accept-button: #f76f53;
           --accept-button-hover: #c85a3e;
           --withdraw-button: #c85a3e;
           --withdraw-button-hover: #f76f53;
           --theme-icon-filter: brightness(0) saturate(100%);
        }

        /* Legacy theme */
        :root[data-theme="legacy"] {
           --bg-primary: #212529;
           --bg-secondary: #343a40;
           --bg-tertiary: #495057;
           --bg-quaternary: #6c757d;
           --bg-primary-theme: #212529;

           --button-primary: #FF7800;
           --button-hover: #FF7800;
           --button-danger: #dc3545;
           --button-danger-hover: #c82333;
           --button-success: #FF7800;
           --button-success-hover: #FF7800;
           --button-secondary: #6c757d;
           --button-secondary-hover: #5a6268;
           --button-info: #FF7800;
           --button-info-hover: #FF7800;

           --text-primary: #f8f9fa;
           --text-secondary: #dee2e6;
           --text-muted: #adb5bd;

           --border-color: rgba(255, 255, 255, 0.14);
           --shadow-color: rgba(0, 0, 0, 0.3);

           --input-bg: rgba(255, 255, 255, 0.06);
           --input-border: rgba(255, 255, 255, 0.2);
           --input-focus: #FF7800;
           --toggle-bg: rgba(255, 255, 255, 0.2);
           --toggle-active: #FF7800;
           --logo-bg: #ffffff;
           --logo-accent: #2563eb;
           --accept-button: #FF7800;
           --accept-button-hover: #FF7800;
           --withdraw-button: #dc3545;
           --withdraw-button-hover: #c82333;
           --theme-icon-filter: brightness(0) invert(1);
        }

        html.theme-preload *,
        html.theme-preload *::before,
        html.theme-preload *::after {
            transition: none !important;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        body {
            margin: 0;
            font-family: "Old-Country-Nobility";
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            font-size: 14px;
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
            min-height: 60px;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        :root[data-theme="legacy"] .logo {
            background: url("../img/linkumori_icon_theme_legacy.svg") center / contain no-repeat;
        }

        :root[data-theme="legacy"] .logo * {
            opacity: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 16px;
            margin: 0;
            font-weight: 600;
            line-height: 1.2;
        }

        .version-badge {
            background: var(--button-primary);
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
            align-self: flex-start;
            letter-spacing: 0.5px;
        }

        .theme-toggle-btn {
            background: transparent;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
            position: relative;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .theme-toggle-btn:hover {
            background: var(--bg-tertiary);
        }

        .theme-toggle-btn:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--button-primary);
        }

        .theme-toggle-btn img {
            width: 14px;
            height: 14px;
            transition: opacity 0.2s;
            display: block;
            filter: var(--theme-icon-filter);
        }

        .sun-icon {
            opacity: 0;
            position: absolute;
        }

        .moon-icon {
            opacity: 1;
        }

        :root[data-theme="light"] .sun-icon {
            opacity: 1;
        }

        :root[data-theme="light"] .moon-icon {
            opacity: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 20px;
        }

        /* Section Headers */
        .section-header {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--button-primary);
        }

        .section-header:first-of-type {
            margin-top: 0;
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px var(--shadow-color);
            border: 1px solid var(--border-color);
        }

        /* Content Area */
        .content-area {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 20px;
            color: var(--text-primary);
            font-size: 14px;
            max-height: 500px;
            overflow-y: auto;
            overflow-x: auto;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            margin: 12px 0;
            line-height: 1.6;
        }

        .content-area::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .content-area::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 8px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--bg-quaternary);
            border-radius: 8px;
            border: 2px solid var(--bg-primary);
        }

        .content-area::-webkit-scrollbar-thumb:hover {
            background: var(--button-primary);
        }

        .privacy-version-row {
            margin: 10px 0 8px 0;
        }

        .privacy-version-label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .privacy-version-select {
            width: 100%;
            max-width: 340px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: "Old-Country-Nobility";
            font-size: 13px;
        }

        .privacy-version-help {
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .content-area.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            color: var(--text-muted);
            font-style: italic;
        }

        .content-area.error {
            color: var(--button-danger);
            background: rgba(220, 38, 38, 0.1);
            border-color: var(--button-danger);
        }

        #licenseContent a,
        #licenseContent a:visited {
            color: var(--text-secondary);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        #licenseContent a:hover {
            color: var(--text-primary);
        }

        /* Button Styles */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: "Old-Country-Nobility";
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-height: 32px;
            position: relative;
            overflow: hidden;
            line-height: 1.2;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn-primary {
            background: var(--button-primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--button-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: var(--button-secondary);
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: var(--button-secondary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3);
        }

        .btn-success {
            background: var(--accept-button);
            color: #ffffff;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-success:hover {
            background: var(--accept-button-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

        .btn-danger {
            background: var(--withdraw-button);
            color: #ffffff;
        }

        .btn-danger:hover {
            background: var(--withdraw-button-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Button Groups */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        /* Privacy Status */
        .privacy-status-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .privacy-status {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid;
            transition: all 0.2s;
        }

        .privacy-status.accepted {
            background: rgba(22, 163, 74, 0.1);
            border-color: var(--accept-button);
            color: var(--accept-button);
        }

        .privacy-status.not-accepted {
            background: rgba(220, 38, 38, 0.1);
            border-color: var(--withdraw-button);
            color: var(--withdraw-button);
        }

        .consent-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 16px 0 0 0;
            color: var(--text-secondary);
        }

        .consent-check input {
            margin-top: 2px;
            accent-color: var(--button-primary);
        }

        .consent-check label {
            cursor: pointer;
        }

        .consent-meta {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .consent-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .info-note {
            margin: 12px 0 0 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.58);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            width: min(560px, 100%);
            max-height: min(80vh, 720px);
            overflow: auto;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 20px 48px var(--shadow-color);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px 14px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            margin: 0;
            font-size: 18px;
            line-height: 1.3;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-close:hover {
            background: var(--bg-tertiary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body p {
            margin: 0 0 14px 0;
        }

        .modal-body p:last-child {
            margin-bottom: 0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 0 20px 20px 20px;
        }

       
        

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .features {
            list-style-type: none;
            padding: 0;
            margin: 20px 0;
        }

        .features li {
            background: var(--bg-primary);
            margin-bottom: 8px;
            padding: 14px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            min-height: 44px; /* Touch-friendly minimum height */
            box-sizing: border-box;
        }

        .features li::before {
            content: '✓';
            color: var(--text-primary);
            margin-right: 12px;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* Permission Management */
 

        /* Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }


        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 12px 16px;
            }
            
            .header {
                padding: 10px 16px;
                min-height: 50px;
            }
            
            .header h1 {
                font-size: 14px;
            }

            .version-badge {
                font-size: 8px;
                padding: 1px 4px;
            }

            .card {
                padding: 12px;
            }

            .section-header {
                font-size: 14px;
                margin: 16px 0 10px 0;
            }

            .button-group {
                flex-direction: column;
            }

            .controls-row {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }

  
            .status-toast {
                bottom: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">             
                <circle cx="50" cy="50" r="45" fill="var(--logo-bg)"/>             
                <path d="M35 50 Q35 35, 50 35 L65 35 Q80 35, 80 50 Q80 65, 65 65 L60 65" 
                      fill="none" 
                      stroke="var(--logo-accent)" 
                      stroke-width="8" 
                      stroke-linecap="round"/>             
                <path d="M65 50 Q65 65, 50 65 L35 65 Q20 65, 20 50 Q20 35, 35 35 L40 35" 
                      fill="none" 
                      stroke="var(--logo-accent)" 
                      stroke-width="8" 
                      stroke-linecap="round"/>             
                <polygon points="75,20 78,28 86,31 78,34 75,42 72,34 64,31 72,28" 
                         fill="var(--logo-accent)"/>         
            </svg>

            <div class="header-text">
                <h1 data-i18n="headerTitle"></h1>
                <span class="version-badge" id="version"></span>
            </div>
        </div>

        <button id="themeToggle" class="theme-toggle-btn" data-i18n-aria="themeToggleAriaLabel">
            <img src="../LinkumorI_HTML_SVG/sun.svg" alt="" class="sun-icon" data-i18n-alt="sunIconAlt">
            <img src="../LinkumorI_HTML_SVG/moon.svg" alt="" class="moon-icon" data-i18n-alt="moonIconAlt">
        </button>
    </header>

    <div class="container">
        <!-- Welcome Section -->
        <h2 id="welcomeSectionHeader" class="section-header" data-i18n="welcomeHeading"></h2>
        <div id="welcomeSectionCard" class="card">
            <p data-i18n="welcomeDescription"></p>
            <ul class="features">
                <li data-i18n="feature1"></li>
                <li data-i18n="feature2"></li>
                <li data-i18n="feature3"></li>
                <li data-i18n="feature4"></li>
            </ul>
            <div class="button-group">
                <a id="openSettingsBtn" href="/html/settings.html" class="btn btn-primary" data-i18n="openSettings"></a>
                <button id="welcomeNextBtn" class="btn btn-secondary" type="button" data-i18n="welcome_next_button"></button>
            </div>
        </div>

        <!-- Privacy Policy Section -->
        <h2 id="privacySectionHeader" class="section-header" data-i18n="privacyPolicySection"></h2>
        <div id="privacySectionCard" class="card">
            <p data-i18n="privacyDescription"></p>
            <p id="legalConsentNotice" data-i18n="legal_consent_notice_default"></p>

            <div class="privacy-status-container">
                <div id="legalConsentStatus" class="privacy-status not-accepted">
                    <span class="status-dot"></span>
                    <span id="legalConsentStatusText" data-i18n="legal_consent_status_required"></span>
                </div>
            </div>

            <div class="privacy-version-row">
                <label id="privacyVersionLabel" class="privacy-version-label" for="privacyVersionSelector" data-i18n="privacyVersionLabel"></label>
                <select id="privacyVersionSelector" class="privacy-version-select"></select>
                <div id="privacyVersionHelp" class="privacy-version-help" data-i18n="privacyVersionDescription"></div>
            </div>

            <!-- Permission Status Display - Moved here to appear right after privacy description -->
           
            
        
            
           
            <div id="privacyContent" class="content-area loading">
                <span data-i18n="loadingPrivacyPolicy"></span>
            </div>

            <div class="controls-row">
                <div class="button-group">
                    <button id="copyPrivacyBtn" class="btn btn-secondary" disabled>
                        <span data-i18n="copyText"></span>
                    </button>
                    <button id="downloadPrivacyBtn" class="btn btn-secondary" disabled>
                        <span data-i18n="downloadText"></span>
                    </button>
                    <button id="legalConsentAcceptBtn" class="btn btn-secondary" type="button" disabled data-i18n="popup_consent_accept_button"></button>
                    <button id="legalConsentWithdrawInfoBtn" class="btn btn-danger" type="button" data-i18n="legal_consent_withdraw_button"></button>
                </div>
            </div>
            <p id="legalConsentWithdrawNote" class="info-note" data-i18n="legal_consent_withdraw_note"></p>
        </div>

        <!-- License Section -->
        <h2 id="licenseSectionHeader" class="section-header" data-i18n="licenseSection"></h2>
        <div id="licenseSectionCard" class="card">
            <p data-i18n="licenseDescription"></p>

            <div id="licenseContent" class="content-area loading">
                <span data-i18n="loadingLicense"></span>
            </div>

            <div class="button-group">
                <button id="copyLicenseBtn" class="btn btn-secondary" disabled>
                    <span data-i18n="copyText"></span>
                </button>
                <button id="downloadLicenseBtn" class="btn btn-secondary" disabled>
                    <span data-i18n="downloadText"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="withdrawConsentModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="withdrawConsentModalTitle" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="withdrawConsentModalTitle" class="modal-title" data-i18n="legal_consent_withdraw_modal_title"></h2>
                <button id="withdrawConsentModalClose" class="modal-close" type="button" data-i18n-aria="legal_consent_withdraw_modal_close" aria-label="">&times;</button>
            </div>
            <div class="modal-body">
                <p id="withdrawConsentModalIntro" data-i18n="legal_consent_withdraw_modal_intro"></p>
                <p id="withdrawConsentModalDeletion" data-i18n="legal_consent_withdraw_modal_deletion"></p>
                <p id="withdrawConsentModalRemote" data-i18n="legal_consent_withdraw_modal_remote"></p>
            </div>
            <div class="modal-actions">
                <button id="withdrawConsentModalAcknowledge" class="btn btn-secondary" type="button" data-i18n="legal_consent_withdraw_modal_close"></button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../core_js/consent_config.js"></script>
    <script src="../external_js/linkumori-i18n.js"></script>
    <script src="../core_js/about.js"></script>
    <script src="../core_js/write_version.js"></script>
</body>
</html>
