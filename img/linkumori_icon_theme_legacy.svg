      <stop offset="0%" style="stop-color:#f47721"/>
      <stop offset="100%" style="stop-color:#c95a0e"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffccaa"/>
      <stop offset="100%" style="stop-color:#f47721"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#f47721" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="38" y="4" width="24" height="10" rx="5" ry="5" fill="url(#lidGrad)"/>
  <rect x="14" y="16" width="72" height="14" rx="7" ry="7" fill="url(#lidGrad)" filter="url(#shadow)"/>
  <path d="M20,34 L24,118 Q24,126 34,126 L66,126 Q76,126 76,118 L80,34 Z"
        fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <path d="M28,38 L30,110 Q30,118 38,118 L42,118 Q38,118 38,110 L36,38 Z"
